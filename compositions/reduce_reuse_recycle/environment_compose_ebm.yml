name: compose_ebm
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - pip:
    # PyTorch — CUDA 12.8 wheels (sm_120 Blackwell / RTX 5090 support)
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - torch==2.7.0
    - torchvision==0.22.0
    # Scientific stack
    - numpy==1.26.4
    - matplotlib>=3.7.0
    - Pillow>=9.5.0
    - tqdm>=4.65.0
    - PyYAML>=6.0
    # Experiment tracking
    - wandb>=0.15.0
